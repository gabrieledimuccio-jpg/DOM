<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timer</title>
    <!--Link BS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Link CSS -->
    <link rel="stylesheet" href="./DOM3.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-5">
                <div class="card mt-5" style="width: 35rem; height: 19rem;">
                    <div class="card-body">
                        <h5 class="card-title text-center">Timer</h5>
                        <p class="card-text text-center">
                            <label class="d-block mb-4" for="number">Inserisci i secondi</label>
                            <input id="input" type="number" min="1" max="3600">
                            <p class="text-center"><strong>countdown</strong></p>
                            <div id="countdown" class="text-center">00</div>
                        </p>
                        <button id="avvia" class="btn btn-primary btn-custom">Avvia/Riprendi</button>
                        <button id="pausa" class="btn btn-primary ms-5 me-5 btn-custom">Pausa</button>
                        <button id="reset" class="btn btn-primary btn-custom">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div> 
    
    
    
    
    
    
    <!-- Link JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./main3.js"></script> 
</body>
</html>
